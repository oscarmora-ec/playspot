<!-- Tells the browser this is a modern HTML5 document -->
<!DOCTYPE html>

<!-- Opens the HTML document, en means English language -->
<html lang="en">

<!-- Head section holds settings - nothing here shows on the page -->
<head>

    <!-- Supports all characters including Spanish accents -->
    <meta charset="UTF-8">

    <!-- Makes the page responsive on phones and tablets -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Text that appears on the browser tab -->
    <title>PlaySpot - Find Activities for Kids</title>

    <!-- This connects our style.css file to this HTML page -->
    <!-- Without this line none of our CSS styling would work -->
    <link rel="stylesheet" href="style.css">

<!-- Closes the head section -->
</head>

<!-- Body is everything the user sees on the page -->
<body>

    <!-- Header is the blue bar at the top of the page -->
    <header>
        <!-- h1 is the biggest title - the emoji adds a fun touch -->
        <h1>🛝 PlaySpot</h1>

        <!-- p is a paragraph - this is the subtitle under the title -->
        <p>Find fun activities for your kids nearby</p>

    <!-- Closes the header -->
    </header>

    <!-- This div is the main container for all activity cards -->
    <!-- class="activities" connects it to the .activities style in CSS -->
    <div class="activities">

        <!-- h2 is a section heading, slightly smaller than h1 -->
        <!-- style="margin-bottom: 15px" adds space below this heading -->
        <h2 style="margin-bottom: 15px;">Activities Near You</h2>

        <!-- Each div with class="card" is one activity box -->
        <!-- class="card" connects it to the .card style in CSS -->
        <div class="card">
            <!-- h3 is the activity name inside the card -->
            <h3>Shawsheen River Park</h3>

            <!-- Each span is one tag badge -->
            <!-- class="tag" connects it to the .tag style in CSS -->
            <!-- The emoji adds a visual hint of what the tag means -->
            <span class="tag">🌳 Outdoor</span>

            <!-- Age range tag -->
            <span class="tag">Ages 2-10</span>

            <!-- Location tag -->
            <span class="tag">📍 Andover, MA</span>

        <!-- Closes this activity card -->
        </div>

        <div class="card">
            <h3>Chucky N Cheese</h3>
            <span class="tag">🏠 Indoor</span>
            <span class="tag">Ages 3-10</span>
            <span class="tag">📍 Methuen, MA</span>
        </div>

        <!-- Second activity card -->
        <div class="card">
            <h3>Kidville Indoor Play</h3>
            <span class="tag">🏠 Indoor</span>
            <span class="tag">Ages 1-7</span>
            <span class="tag">📍 Burlington, MA</span>
        </div>

        <!-- Third activity card -->
        <div class="card">
            <h3>Discovery Museum</h3>
            <span class="tag">🏠 Indoor</span>
            <span class="tag">Ages 2-10</span>
            <span class="tag">📍 Acton, MA</span>
        </div>

    <!-- Closes the activities container -->
    </div>

<!-- Closes the body -->
</body>

<!-- Closes the entire HTML document -->
</html>
