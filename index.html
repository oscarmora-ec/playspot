<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlaySpot - Find Activities for Kids</title>

    <!-- Links our CSS file for styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header section at the top of the page -->
    <header>
        <h1>🛝 PlaySpot</h1>
        <p>Find fun activities for your kids nearby</p>
    </header>

    <!-- Main activities section -->
    <div class="activities">

        <h2 style="margin-bottom: 15px;">Activities Near You</h2>

        <!-- This div will be populated by JavaScript -->
        <!-- Instead of hardcoded cards we now load from API -->
        <div id="activities-container">

            <!-- Loading message shown while API call is in progress -->
            <p id="loading">Loading activities...</p>

        </div>

    </div>

    <!-- JavaScript section -->
    <!-- This runs after the page loads -->
    <script>

        // The URL of our Azure Function API
        // This is the live URL we just deployed
        const API_URL = 'https://playspot-api.azurewebsites.net/api/getactivities';

        // This function builds an HTML card for each activity
        // It takes one activity object and returns HTML string
        function buildActivityCard(activity) {
            return `
                <div class="card">
                    ${activity.image 
                        ? `<img 
                            src="${activity.image}" 
                            alt="${activity.name}" 
                            style="width:100%; border-radius:6px; margin-bottom:10px;"
                          >`
                        : ''
                    }
                    <h3>${activity.name}</h3>
                    <span class="tag">${activity.type === 'Outdoor' ? '🌳' : '🏠'} ${activity.type}</span>
                    <span class="tag">Ages ${activity.ageMin}-${activity.ageMax}</span>
                    <span class="tag">📍 ${activity.city}, ${activity.state}</span>
                </div>
            `;
        }

        // This function loads activities from our API
        // async means it runs without blocking the page
        async function loadActivities() {

            try {
                // Call our Azure Function API
                // fetch is a built in browser function for making HTTP requests
                const response = await fetch(API_URL);

                // Convert the response to a JavaScript array
                const activities = await response.json();

                // Get the container div where we will put the cards
                const container = document.getElementById('activities-container');

                // Remove the loading message
                document.getElementById('loading').remove();

                // Check if we got any activities back
                if (activities.length === 0) {
                    container.innerHTML = '<p>No activities found.</p>';
                    return;
                }

                // Loop through each activity and build a card
                // join combines all cards into one HTML string
                container.innerHTML = activities
                    .map(activity => buildActivityCard(activity))
                    .join('');

            } catch (error) {
                // If something goes wrong show an error message
                document.getElementById('loading').textContent = 
                    'Error loading activities. Please try again later.';
                console.error('Error:', error);
            }
        }

        // Call loadActivities when the page loads
        loadActivities();

    </script>

</body>
</html>
